<!DOCTYPE html>
<html>
<head>
    <title>Viewer</title>
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
        }
        iframe, video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        video {
            object-fit: contain;
        }
    </style>
</head>
<body>

<script>
let current = null

window.addEventListener("message", function(event) {
    let url = event.data

    if (typeof url !== "string") return

    if (current) current.remove()

    if (url.endsWith(".mp4")) {
        let vid = document.createElement("video")
        vid.src = url
        vid.autoplay = true
        vid.controls = true
        document.body.appendChild(vid)
        current = vid
    } else {
        let frame = document.createElement("iframe")
        frame.src = url
        document.body.appendChild(frame)
        current = frame
    }
})

window.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
        parent.postMessage("escape", "*")
    }
})

parent.postMessage("ready", "*")
</script>

</body>
</html>
