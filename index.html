<!DOCTYPE html>
<html>
<head>
    <title>Viewer</title>
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
        }

        #playBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 18px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 3;
        }

        #closeBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: white;
            background: rgba(0,0,0,0.6);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            padding: 5px 10px;
            display: none;
            z-index: 4;
        }

        .interactiveBtn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 3;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

<button id="playBtn">Play</button>
<button id="closeBtn">✕</button>

<script>
let videoElement = null
let hideTimeout = null
let savedTime = 0
let buttons = {}
let pendingButtons = []
let isSeeking = false

function getVideoFromURL() {
    let params = new URLSearchParams(window.location.search)
    return params.get("video")
}

function createVideo(url) {
    let vid = document.createElement("video")
    vid.src = url
    vid.controls = true
    vid.currentTime = savedTime

    vid.addEventListener("seeking", () => isSeeking = true)
    vid.addEventListener("seeked", () => isSeeking = false)

    document.body.appendChild(vid)
    videoElement = vid

    pendingButtons.forEach(addInteractiveButton)
    pendingButtons = []
}

function startVideo() {
    let url = getVideoFromURL()
    if (!url) return

    document.getElementById("playBtn").style.display = "none"

    if (url.endsWith(".mp4")) {
        if (!videoElement) createVideo(url)
        videoElement.play()
    }
}

function showClose() {
    const btn = document.getElementById("closeBtn")
    btn.style.display = "block"
    clearTimeout(hideTimeout)
    hideTimeout = setTimeout(() => btn.style.display = "none", 2000)
}

function sendClose() {
    const time = videoElement ? videoElement.currentTime : 0
    parent.postMessage(JSON.stringify({type:"close", time}), "*")
}

function exitPlayer() {
    sendClose()
    document.body.innerHTML = ""
}

function addInteractiveButton(data) {
    if (buttons[data.buttonid]) return

    const btn = document.createElement("button")
    btn.className = "interactiveBtn"
    btn.innerText = data.text || "Button"

    btn.onclick = () => {
        if (videoElement) videoElement.currentTime = data.timeend
    }

    document.body.appendChild(btn)

    buttons[data.buttonid] = {
        element: btn,
        timestart: data.timestart || 0,
        timeend: data.timeend || 0,
        active: false,
        timeout: null
    }
}

function updateInteractiveButtons() {
    if (!videoElement || isSeeking) return

    const currentTime = videoElement.currentTime

    for (let id in buttons) {
        const b = buttons[id]
        const shouldShow = currentTime >= b.timestart && currentTime <= b.timeend

        if (shouldShow && !b.active) {
            b.active = true
            b.element.style.opacity = 1
            b.element.style.pointerEvents = "auto"

            clearTimeout(b.timeout)
            b.timeout = setTimeout(() => {
                b.element.style.opacity = 0
                b.element.style.pointerEvents = "none"
                b.active = false
            }, 4000)
        }

        if (!shouldShow && b.active) {
            b.element.style.opacity = 0
            b.element.style.pointerEvents = "none"
            b.active = false
        }
    }
}

function animationLoop() {
    updateInteractiveButtons()
    requestAnimationFrame(animationLoop)
}

document.getElementById("playBtn").onclick = startVideo
document.getElementById("closeBtn").onclick = exitPlayer

window.addEventListener("mousemove", showClose)

window.addEventListener("keydown", e => {
    if (e.key === "Escape") {
        if (videoElement && !videoElement.paused) {
            videoElement.pause()
        } else {
            exitPlayer()
        }
    }
})

window.addEventListener("message", event => {
    let data = event.data
    try { if (typeof data === "string") data = JSON.parse(data) } catch {}
    if (!data || !data.type) return

    if (data.type === "settime") {
        savedTime = data.time || 0
        if (videoElement) videoElement.currentTime = savedTime
    }

    if (data.type === "button") {
        if (videoElement) addInteractiveButton(data)
        else pendingButtons.push(data)
    }
})

animationLoop()
</script>

</body>
</html>
