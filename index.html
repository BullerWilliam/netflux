<!DOCTYPE html>
<html>
<head>
    <title>Viewer</title>
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
        }
        iframe, video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        video {
            object-fit: contain;
        }
    </style>
</head>
<body tabindex="0">

<script>
let current = null
let lastURL = null

function loadContent(url) {
    if (!url) return

    lastURL = url

    if (current) current.remove()

    if (url.endsWith(".mp4")) {
        let vid = document.createElement("video")
        vid.src = url
        vid.autoplay = true
        vid.controls = true
        vid.style.width = "100%"
        vid.style.height = "100%"
        document.body.appendChild(vid)
        current = vid
    } else {
        let frame = document.createElement("iframe")
        frame.src = url
        document.body.appendChild(frame)
        current = frame
    }
}

window.addEventListener("message", function(event) {
    let url = event.data

    if (typeof url === "string") {
        loadContent(url)
    }
})

window.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
        parent.postMessage("escape", "*")
    }
})

window.onload = function() {
    document.body.focus()
    parent.postMessage("ready", "*")
}
</script>

</body>
</html>
