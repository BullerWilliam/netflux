<!DOCTYPE html>
<html>
<head>
    <title>Viewer</title>
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
        }

        iframe, video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        video {
            object-fit: contain;
        }

        #playBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 3;
        }

        #closeBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: white;
            background: rgba(0,0,0,0.6);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            padding: 5px 10px;
            display: none;
            z-index: 4;
        }
    </style>
</head>
<body>

<button id="playBtn">Play</button>
<button id="closeBtn">✕</button>

<script>
let videoElement = null
let hideTimeout = null

function getVideoFromURL() {
    let params = new URLSearchParams(window.location.search)
    return params.get("video")
}

function startVideo() {
    let url = getVideoFromURL()
    if (!url) return

    document.getElementById("playBtn").style.display = "none"

    if (url.endsWith(".mp4")) {
        let vid = document.createElement("video")
        vid.src = url
        vid.controls = true
        vid.muted = false

        vid.play()

        document.body.appendChild(vid)
        videoElement = vid
    } else {
        let frame = document.createElement("iframe")
        frame.src = url
        document.body.appendChild(frame)
    }
}

function showClose() {
    let btn = document.getElementById("closeBtn")
    btn.style.display = "block"

    clearTimeout(hideTimeout)
    hideTimeout = setTimeout(() => {
        btn.style.display = "none"
    }, 2000)
}

function exitPlayer() {
    document.body.innerHTML = ""
    parent.postMessage("escape", "*")
}

document.getElementById("playBtn").onclick = startVideo
document.getElementById("closeBtn").onclick = exitPlayer

window.addEventListener("mousemove", showClose)

window.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
        exitPlayer()
    }
})
</script>

</body>
</html>
