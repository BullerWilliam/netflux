<!DOCTYPE html>
<html>
<head>
    <title>Viewer</title>
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
        }
        iframe, video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        video {
            object-fit: contain;
        }
    </style>
</head>
<body>

<script>
let current = null

function getVideoFromURL() {
    let params = new URLSearchParams(window.location.search)
    return params.get("video")
}

function loadContent(url) {
    if (!url) return

    if (current) current.remove()

    if (url.endsWith(".mp4")) {
        let vid = document.createElement("video")
        vid.src = url
        vid.autoplay = true
        vid.muted = true
        vid.controls = true
        vid.playsInline = true
        document.body.appendChild(vid)
        current = vid
    } else {
        let frame = document.createElement("iframe")
        frame.src = url
        document.body.appendChild(frame)
        current = frame
    }
}

window.onload = function() {
    let video = getVideoFromURL()
    loadContent(video)
}

window.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
        parent.postMessage("escape", "*")
    }
})
</script>

</body>
</html>
